# BDA LMIS — reverse proxy + static asset server.
#
# Layout:
#   /             → React SPA (built by frontend/Dockerfile.prod into /dist)
#   /api/         → Django + Gunicorn on backend:8000
#   /admin/       → Django admin (same upstream)
#   /static/      → Django collected static (from backend image)
#   /media/       → Uploaded files (FileField targets)
#
# SSL: HTTPS on :443 reads from /etc/letsencrypt/live/<DOMAIN>/.
# The deploy bootstrap seeds a self-signed cert into that path so this
# config can boot before the first Let's Encrypt issuance, then certbot
# (run via `docker compose run certbot ...`) writes the real cert and
# `nginx -s reload` picks it up.

upstream django {
    server backend:8000;
    keepalive 32;
}

client_max_body_size 25M;

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff2;

# ── Default servers — drop any request that isn't for the real domain.
# Browsers hitting the bare IP get an empty response (444) instead of the
# app. The HTTPS variant must still present a cert (we reuse the LE one)
# so the SSL handshake can complete before we close — without this, the
# 443 listener wouldn't bind at all.

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    http2  on;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/lmis.bdabharatpur.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lmis.bdabharatpur.org/privkey.pem;
    return 444;
}

# ── HTTP :80 (real domain) — ACME challenges + HTTPS redirect ──────────
server {
    listen 80;
    server_name lmis.bdabharatpur.org;

    # Let's Encrypt challenge endpoint must stay reachable over HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Everything else gets pushed to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — full app ───────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name lmis.bdabharatpur.org;

    ssl_certificate     /etc/letsencrypt/live/lmis.bdabharatpur.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lmis.bdabharatpur.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    root  /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets — far-future cache. Their filenames carry a
    # content hash (e.g. index-DP2pczyq.js) so a code change produces a
    # new URL; never serve a stale one.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached — every reload should fetch the
    # latest pointer to the current /assets/*.js bundle. Without this,
    # browsers happily serve a yesterday's index.html that references a
    # /assets/index-OLDHASH.js that doesn't exist on disk anymore →
    # 404s on reload after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma  "no-cache" always;
        expires    -1;
    }

    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Django admin lives at /django-admin/ — the /admin/* prefix is
    # claimed by the React app (/admin/users, /admin/audit-logs). If
    # we proxied /admin/ to Django, reloading any of those React URLs
    # would land in Django's login page.
    location /django-admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    # SPA fallback — every other path resolves to index.html so the React
    # router can take over (e.g. /public/colonies/12). Belt-and-suspenders
    # cache headers here too in case nginx's internal-redirect to
    # /index.html doesn't re-match the exact location above on some
    # request paths.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma  "no-cache" always;
        expires    -1;
        try_files $uri $uri/ /index.html;
    }
}

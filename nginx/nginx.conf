# BDA LMIS — reverse proxy + static asset server.
#
# Layout:
#   /             → React SPA (built by frontend/Dockerfile.prod into /dist)
#   /api/         → Django + Gunicorn on backend:8000
#   /admin/       → Django admin (same upstream)
#   /static/      → Django collected static (from backend image)
#   /media/       → Uploaded files (FileField targets)

upstream django {
    server backend:8000;
    keepalive 32;
}

# Bump body size for layout uploads (PDF/Shapefile/etc. — 20 MB cap)
client_max_body_size 25M;

# Gzip text/JSON/JS/CSS to keep public-portal payloads small.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff2;

server {
    listen 80;
    server_name lmis.bdabharatpur.org _;

    # ── React SPA (built bundle volume) ─────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Static assets (hashed) — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Django backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django collected static (admin CSS, etc.)
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    # User-uploaded files (FileField targets: colony maps, documents, …)
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        # Files are private; only authenticated users hit URLs here via
        # the React UI but we don't enforce that at Nginx today. Tighten
        # with auth_request when fine-grained ACLs are needed.
    }

    # ── SPA fallback — every other path resolves to index.html so the
    #    React router takes over (e.g. /public/colonies/12). ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

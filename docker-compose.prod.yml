# Production stack for BDA LMIS.
#
# Differences from docker-compose.yml (dev):
#   - Backend runs Gunicorn (not `runserver`); no source bind-mount.
#   - Frontend is a multi-stage build that emits a static bundle into a
#     named volume; no Vite dev server.
#   - New `nginx` service is the only externally exposed port (80).
#   - DB and Redis are NOT exposed on the host (internal-only).
#   - pgadmin removed; admin via Django /admin/ or `psql` inside the
#     container.

services:

  db:
    image: postgis/postgis:14-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    # Linux Docker doesn't resolve host.docker.internal by default; this
    # makes it route to the host gateway so the backend container can
    # reach the dms-tunnel.service listening on the host's 127.0.0.1:3307.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    # Periodic scheduler — fires dms_sync.sync at 02:00 IST nightly
    # (see CELERY_BEAT_SCHEDULE in config/settings.py).
    command: celery -A config beat -l info --pidfile=/tmp/celerybeat.pid
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Same-origin via nginx; React calls `/api/...` and lands here.
        VITE_API_URL: ""
    image: bda-lmis-frontend-build
    volumes:
      - frontend_dist:/dist
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"

  # Issue or renew the Let's Encrypt cert. The default `renew` action is
  # idempotent and a no-op when the cert isn't due. Use `certonly` for
  # initial issuance.
  #
  #   First issuance:
  #     docker compose -f docker-compose.prod.yml --profile certbot \
  #         run --rm certbot certonly --webroot --webroot-path /var/www/certbot \
  #           --email "$CERTBOT_EMAIL" --agree-tos --no-eff-email \
  #           --non-interactive -d "$CERTBOT_DOMAINS"
  #
  #   Renewal (safe to schedule on a cron / systemd timer):
  #     docker compose -f docker-compose.prod.yml --profile certbot \
  #         run --rm certbot renew --quiet
  #     docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
  certbot:
    image: certbot/certbot:v3.0.1
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    profiles: ["certbot"]

volumes:
  postgres_data:
  django_static:
  django_media:
  frontend_dist:
  certbot_webroot:
  letsencrypt:
